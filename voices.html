<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vozes disponíveis</title>
<style>
  body { background:#1a1a2e; color:#eee; font-family:system-ui,sans-serif; padding:20px; max-width:600px; margin:auto; }
  h1 { color:#4ecca3; font-size:20px; }
  .voice { background:#16213e; border-radius:10px; padding:12px 16px; margin:8px 0; display:flex; justify-content:space-between; align-items:center; }
  .voice .name { font-size:14px; }
  .voice .lang { color:#888; font-size:12px; }
  button { background:#4ecca3; border:none; color:#1a1a2e; padding:6px 16px; border-radius:8px; font-weight:700; cursor:pointer; }
  button:hover { background:#3dba93; }
  .loading { color:#888; text-align:center; padding:40px; }
  #testBtn { display:block; margin:20px auto; padding:12px 32px; font-size:16px; background:#f1c40f; }
</style>
</head>
<body>
<h1>🎤 Vozes disponíveis</h1>
<p style="color:#888;font-size:13px">Toque num botão para ouvir a voz a dizer "Encontra a letra A"</p>
<button id="testBtn" onclick="testPhrase()">🔊 Ouvir frase de teste</button>
<div id="list" class="loading">A carregar vozes...</div>
<script>
function testPhrase() {
  if (!window.speechSynthesis) return alert('Sem síntese de voz');
  const u = new SpeechSynthesisUtterance('Encontra a letra A');
  u.lang = 'pt-PT'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function loadVoices() {
  const voices = window.speechSynthesis.getVoices();
  const list = document.getElementById('list');
  if (voices.length === 0) {
    list.innerHTML = '<div class="loading">Nenhuma voz encontrada</div>';
    return;
  }
  list.innerHTML = '';
  voices.forEach((v, i) => {
    const d = document.createElement('div');
    d.className = 'voice';
    const isPT = v.lang.indexOf('pt') === 0 || v.lang.indexOf('PT') >= 0;
    const isEN = v.lang.indexOf('en') === 0;
    d.innerHTML = `<div><div class="name">${v.name} ${isPT ? '🇵🇹' : isEN ? '🇬🇧' : ''}</div><div class="lang">${v.lang}${v.localService ? ' • local' : ''}</div></div>
      <button onclick="playVoice(${i})">▶ Ouvir</button>`;
    list.appendChild(d);
  });
}

function playVoice(idx) {
  const voices = window.speechSynthesis.getVoices();
  const v = voices[idx];
  if (!v) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance('Encontra a letra A');
  u.voice = v; u.lang = v.lang; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices(); // seed
  setTimeout(loadVoices, 100);
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
} else {
  document.getElementById('list').innerHTML = '<div class="loading">Sem suporte de síntese de voz</div>';
}
</script>
</body>
</html>
