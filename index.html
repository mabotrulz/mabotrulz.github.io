<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mabotrulz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 16px;
  }

  .container {
    max-width: 600px;
    width: 100%;
    text-align: center;
  }

  .title {
    font-size: clamp(20px, 5vw, 32px);
    font-weight: 800;
    margin-bottom: 4px;
    background: linear-gradient(135deg, #4ecca3, #00d2ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    color: #555;
    font-size: clamp(12px, 2.5vw, 15px);
    margin-bottom: 36px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #fff;
    transition: transform 0.2s;
    cursor: pointer;
  }
  .app:hover { transform: translateY(-4px); }

  .icon {
    width: clamp(64px, 16vw, 96px);
    height: clamp(64px, 16vw, 96px);
    border-radius: 22px;
    overflow: hidden;
    background: #16162a;
    border: 2px solid #2a2a40;
    transition: border-color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .app:hover .icon { border-color: #4ecca3; }

  .icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Fallback emoji icons when no image */
  .icon .emoji {
    font-size: clamp(28px, 7vw, 44px);
    line-height: 1;
  }

  .app-label {
    margin-top: 8px;
    font-size: clamp(11px, 2.5vw, 14px);
    font-weight: 600;
    color: #ccc;
    text-align: center;
    line-height: 1.2;
  }
  .app-label small {
    display: block;
    font-size: clamp(9px, 1.8vw, 11px);
    font-weight: 400;
    color: #666;
    margin-top: 2px;
  }

  .footer {
    margin-top: 48px;
    color: #333;
    font-size: 12px;
  }
  .footer a { color: #555; text-decoration: none; }
  .footer a:hover { color: #4ecca3; }
</style>
</head>
<body>
<div class="container">
  <div class="title">mabotrulz</div>
  <div class="subtitle">projects</div>

  <div class="grid">
    <a class="app" href="https://mabotrulz.github.io/slithergrid" target="_blank">
      <div class="icon"><img src="slithergrid_icon.png" alt="SlitherGrid"></div>
      <div class="app-label">SlitherGrid<small>Snake battle</small></div>
    </a>

    <a class="app" href="https://mabotrulz.github.io/neogame" target="_blank">
      <div class="icon"><img src="neogame_icon.png" alt="Joga com Neo"></div>
      <div class="app-label">Joga com Neo<small>Letter game</small></div>
    </a>

    <a class="app" href="https://mabotrulz.github.io/numeros" target="_blank">
      <div class="icon"><img src="numeros_icon.png" alt="Números"></div>
      <div class="app-label">Números<small>Number game</small></div>
    </a>

    <a class="app" href="https://mabotrulz.github.io/memoria" target="_blank">
      <div class="icon"><img src="memoria_icon.png" alt="Memória"></div>
      <div class="app-label">Memória<small>Pokémon memory</small></div>
    </a>

    <a class="app" href="https://mabotrulz.github.io/contar" target="_blank">
      <div class="icon"><img src="contar_icon.png" alt="Contar"></div>
      <div class="app-label">Contar<small>Gabby's Dollhouse</small></div>
    </a>

    <a class="app" href="https://mabotrulz.github.io/somar" target="_blank">
      <div class="icon"><img src="somar_icon.png" alt="Somar"></div>
      <div class="app-label">Somar<small>PAW Patrol</small></div>
    </a>

    <a class="app" href="https://mabotrulz.github.io/sequencia" target="_blank">
      <div class="icon"><img src="sequencia_icon.png" alt="Sequência"></div>
      <div class="app-label">Sequência<small>Pattern detection</small></div>
    </a>

    <a class="app" href="https://mabotrulz.github.io/asterix-game" target="_blank">
      <div class="icon"><img src="asterix_icon.png" alt="Via Gálica"></div>
      <div class="app-label">Via Gálica<small>Asterix road puzzle</small></div>
    </a>
  </div>

  <div class="footer"><a href="https://github.com/mabotrulz">github.com/mabotrulz</a></div>
</div>
</body>
</html>
